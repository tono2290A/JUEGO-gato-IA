<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Gato IA</title>

      <link rel="icon"
    type="image/png"
    href="logo.png">

    <link rel="stylesheet"
    href="estilo.css">

</head>

<body>

    <!-- TITULO -->

    <h1>GATO IA</h1>

    <!-- ESTADO -->

    <div id="status">

        Tu turno

    </div>

    <!-- =====================================================
         MARCADOR
    ===================================================== -->

    <div id="scoreboard">

        <p>

            Jugador:
            <span id="playerScore">
                0
            </span>

        </p>

        <p>

            IA:
            <span id="aiScore">
                0
            </span>

        </p>

        <p>

            Empates:
            <span id="drawScore">
                0
            </span>

        </p>

    </div>

    <!-- TABLERO -->

    <div class="board"
    id="board"></div>

    <!-- BOTON -->

    <button onclick="restartGame()">

        REINICIAR

    </button>

    <!-- =====================================================
         SONIDOS
    ===================================================== -->

    <audio id="click"
    src="Sonidos/click.mp3">
    </audio>

    <audio id="ganar"
    src="Sonidos/Ganar.mp3">
    </audio>

    <audio id="perder"
    src="Sonidos/Perder.mp3">
    </audio>

    <audio id="empate"
    src="Sonidos/Empate.mp3">
    </audio>

    <!-- JAVASCRIPT -->

    <script src="game.js"></script>

</body>

</html>
